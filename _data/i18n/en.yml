faq:
  title: "Frequently Asked Questions"
  items:
    - q: "Who is this program designed for?"
      a: "<p>This program is designed for working professionals, beginners in trading, and individuals who want to understand the stock market through a structured approach rather than depending on tips.</p>"
    - q: "Is this program suitable for complete beginners?"
      a: "<p>Yes. The program starts with foundational concepts and gradually moves toward understanding price behaviour, chart reading, and risk management principles.</p>"
    - q: "What will I learn in this program?"
      a: "<p>Participants will learn the fundamentals of capital markets step by step. The program is designed to provide a clear understanding of how markets function, including:</p><ul><li>The formation of a company and basics of the primary market</li><li>Understanding management structure and financial reports</li><li>Key parameters used in evaluating businesses</li><li>The functioning of secondary markets</li><li>Chart reading &mdash; the core focus of the program</li><li>Understanding price behaviour and market structure</li><li>An introduction to derivatives</li><li>Position sizing and the importance of risk management in trading</li></ul><p>The goal of the program is to help participants develop a structured approach to understanding markets and making informed decisions.</p>"
    - q: "Do I need prior trading experience to join?"
      a: "<p>No prior experience is required. However, participants should have a genuine interest in learning the markets with discipline and patience.</p>"
    - q: "How long is the program?"
      a: "<p>You can find the details <a href=\"#programs\">here</a>.</p>"
    - q: "Will this program guarantee profits in the stock market?"
      a: "<p>No educational program can guarantee profits in the stock market. The goal of this program is to provide a structured framework to understand markets and manage risk responsibly.</p>"
    - q: "How is this program different from other trading courses?"
      a: "<p>This program focuses on developing a structured approach to understanding price behaviour and risk management rather than depending on tips, shortcuts, or random strategies.</p>"
    - q: "How can I join the program?"
      a: "<p>You can view upcoming batches for each program and check availability directly through WhatsApp.</p><p>Click <a href=\"#programs\">here</a> to view upcoming batches.</p>"
    - q: "Who should NOT join this program?"
      a: "<p>This program may not be suitable for individuals looking for quick profits, guaranteed returns, or daily trading tips.</p>"

