    - "The content does not constitute investment advice, research recommendation, trading advice, or a buy/sell recommendation for any securities, derivatives, or financial instruments."
    - "No live trading calls, stock recommendations, or personalised investment advice are provided through any course, session, or communication channel."
    - "All examples, charts, and case studies discussed during programs are used strictly for educational illustration."
    - "Participants and viewers are solely responsible for their own investment and trading decisions. Before making any investment decisions, individuals are advised to conduct their own research and/or consult a SEBI-registered Investment Adviser or Research Analyst."
    - "Stock market investments are subject to market risks. Past performance does not guarantee future results."
