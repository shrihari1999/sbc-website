benefits:
  title: "கூடுதல் நன்மைகள்"
  items:
    - title: "நம்பிக்கை வளர்க்க"
      desc: "சேருவதற்கு முன் பயிற்சியாளருடன் நேரடியாகப் பேசுங்கள்."
    - title: "சிறிய எண்ணிக்கையிலான பங்கேற்பாளர்கள்"
      desc: "ஒரு வகுப்பில் அதிகபட்சம் 7 பங்கேற்பாளர்கள் — தனிப்பட்ட கவனிப்பு உறுதி."
    - title: "சந்தேக நிவர்த்தி அமர்வுகள்"
      desc: "பயிற்சிக்குப் பிறகு 1 மாதம் — ஒவ்வொரு வேலை நாளும் 15 நிமிடங்கள்."
    - title: "வகுப்புகளுக்குப் பின்னான விளக்க உதவிகள்"
      desc: "ஆண்களுக்கு 1 மாதம், பெண்களுக்கு 2 மாதங்கள் — வர்த்தகம் தொடங்கும்போது வழிகாட்டல்."

faq:
  title: "அடிக்கடி கேட்கப்படும் கேள்விகள்"
  items:
    - q: "இந்த வகுப்புகள் யாருக்காக வடிவமைக்கப்பட்டுள்ளன?"
      a: "<p>இந்த வகுப்புகள்  குறிப்புகளைச் சார்ந்திராமல் கட்டமைக்கப்பட்ட அணுகுமுறையில் பங்குச் சந்தையைப் புரிந்துகொள்ள விரும்பும் அனைவருக்குமாக வடிவமைக்கப்பட்டுள்ளன.</p>"
    - q: "முழு தொடக்கநிலையினருக்கு இந்த வகுப்புகள் ஏற்றதா?"
      a: "<p>ஆம். வகுப்புகள் அடிப்படைக் கருத்துகளுடன் தொடங்கிப், படிப்படியாக விலை நடவடிக்கை, விளக்கப்பட வாசிப்பு மற்றும் இடர் மேலாண்மைக் கொள்கைகளை புரிந்துகொள்வதற்கு நகர்கின்றன.தொடக்க நிலையில் இருப்பவருக்கும் எளிய வகையில் புரியும்படி அமைக்கப்பட்டுள்ளன. </p>"
    - q: "இந்தத் வகுப்பில் நான் என்ன கற்றுக்கொள்வேன்?"
      a: "<p>பங்கேற்பாளர்கள் மூலதன சந்தைகளின் அடிப்படைகளைப் படிப்படியாக கற்றுக்கொள்வார்கள். சந்தைகள் எவ்வாறு செயல்படுகின்றன என்பதைத் தெளிவாகப் புரிந்துகொள்ளும்படி வகுப்புகள் வடிவமைக்கப்பட்டுள்ளன, இதில் அடங்கும்:</p><ul><li>ஒரு நிறுவனத்தின் உருவாக்கம் மற்றும் முதன்மை சந்தையின் அடிப்படைகள்</li><li>மேலாண்மை அமைப்பு மற்றும் நிதி அறிக்கைகளைப் புரிந்துகொள்வது</li><li>வணிகங்களை மதிப்பிடுவதில் பயன்படுத்தப்படும் முக்கிய அளவுருக்கள்</li><li>இரண்டாம் நிலை சந்தைகளின் செயல்பாடு</li><li>விளக்கப்பட வாசிப்பு &mdash; வகுப்பின் மையக் கவனம்</li><li>விலை நடவடிக்கை மற்றும் சந்தை அமைப்பைப் புரிந்துகொள்வது</li><li>வழிப்பொருள்களுக்கு அறிமுகம்</li><li>நிலை அளவிடுதல் மற்றும் வர்த்தகத்தில் இடர் மேலாண்மையின் முக்கியத்துவம்</li></ul><p>சந்தைகளைப் புரிந்துகொண்டு தகவலறிந்த முடிவுகளை எடுக்க கட்டமைக்கப்பட்ட அணுகுமுறையை வளர்க்கத் வகுப்புகள் உதவுகின்றன.</p>"
    - q: "சேர முன் வர்த்தக அனுபவம் தேவையா?"
      a: "<p>முன் அனுபவம் தேவையில்லை. இருப்பினும், பங்கேற்பாளர்களுக்கு ஒழுக்கம் மற்றும் பொறுமையுடன் சந்தைகளைக் கற்றுக்கொள்வதில் உண்மையான ஆர்வம் இருக்க வேண்டும்.</p>"
    - q: "வகுப்புகள் எத்தனை நாட்கள் நடைபெறும்?"
      a: "<p>விவரங்களை <a href=\"#programs\">இங்கே</a> காணலாம்.</p>"
    - q: "இந்தத் திட்டம் பங்குச் சந்தையில் லாபத்தை உறுதி செய்யுமா?"
      a: "<p>எந்தக் கல்வித் திட்டமும் பங்கு சந்தையில் லாபத்தை உறுதி செய்ய முடியாது. இந்த வகுப்புகளின் குறிக்கோள் சந்தைகளைப் புரிந்துகொண்டு இடர்களைப் பொறுப்புடன் நிர்வகிக்க வடிவமைக்கப்பட்ட கட்டமைப்பை வழங்குவது.</p>"
    - q: "இந்தத் திட்டம் மற்ற வர்த்தகப் படிப்புகளிலிருந்து எவ்வாறு வேறுபடுகிறது?"
      a: "<p>இந்தத் திட்டம், குறிப்புகள், குறுக்கு வழிகள் அல்லது சீரற்ற உத்திகளைச் சார்ந்திராமல் விலை நடவடிக்கை மற்றும் இடர் மேலாண்மையைப் புரிந்துகொள்வதற்கான அணுகுமுறையை வளர்ப்பதில் கவனம் செலுத்துகிறது.</p>"
    - q: "வகுப்பில் எவ்வாறு சேர்வது?"
      a: "<p>ஒவ்வொரு பிரிவிலும் வரவிருக்கும் வகுப்புகளைப்  பற்றிய தேதி விவரங்களைப் பார்க்கலாம் மற்றும் வாட்ஸ்அப் மூலம் அந்த வகுப்பில் இடம் உள்ளதா எனக் கேட்டறியலாம்.</p><p>வரவிருக்கும் வகுப்புகளைக் காண <a href=\"#programs\">இங்கே</a> கிளிக் செய்யுங்கள்.</p>"
    - q: "இந்தத் திட்டத்தில் யார் சேரக்கூடாது?"
      a: "<p>விரைவான லாபம், உறுதியான வருமானம் அல்லது தினசரி வர்த்தகக் குறிப்புகளைத் தேடுவோருக்கு இந்தத் திட்டம் ஏற்றதாக இருக்காது.</p>"

contact:
