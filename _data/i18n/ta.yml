  tagline: "கற்றுக்கொள்ளுங்கள். பகுப்பாய்வு செய்யுங்கள். நம்பிக்கையுடன் வர்த்தகம் செய்யுங்கள்."

disclaimer:
  title: "பொறுப்புத் துறப்பு"
  items:
    - "இந்த இணையதளத்தில் வழங்கப்படும் தகவல்கள், உள்ளடக்கம், பயிற்சித் திட்டங்கள், இணைய கருத்தரங்குகள் மற்றும் பொருட்கள் ஆகியவை கல்வி மற்றும் தகவல் நோக்கங்களுக்காக மட்டுமே."
    - "இந்த உள்ளடக்கம் முதலீட்டு ஆலோசனை, ஆராய்ச்சிப் பரிந்துரை, வர்த்தக ஆலோசனை அல்லது எந்த பத்திரங்கள், வழிப்பொருள்கள் அல்லது நிதிக் கருவிகளுக்கும் வாங்கு/விற்பரிந்துரை அல்ல."
    - "எந்தப் படிப்பு, அமர்வு அல்லது தகவல்தொடர்புச் சேனல் மூலமும் நேரலை வர்த்தக அழைப்புகள், பங்குப் பரிந்துரைகள் அல்லது தனிப்பயனாக்கப்பட்ட முதலீட்டு ஆலோசனை வழங்கப்படவில்லை."
    - "திட்டங்களில் விவாதிக்கப்படும் அனைத்து எடுத்துக்காட்டுகள், விளக்கப்படங்கள் மற்றும் வழக்கு ஆய்வுகள் கண்டிப்பாக கல்வி விளக்கத்திற்காக மட்டுமே பயன்படுத்தப்படுகின்றன."
    - "பங்கேற்பாளர்கள் மற்றும் பார்வையாளர்கள் தங்கள் சொந்த முதலீடு மற்றும் வர்த்தக முடிவுகளுக்கு அவர்களே பொறுப்பானவர்கள். எந்த முதலீட்டு முடிவும் எடுப்பதற்கு முன், SEBI பதிவுசெய்யப்பட்ட முதலீட்டு ஆலோசகர் அல்லது ஆராய்ச்சி ஆய்வாளரை அணுகுமாறு பரிந்துரைக்கப்படுகிறது."
    - "பங்குச் சந்தை முதலீடுகள் சந்தை அபாயங்களுக்கு உட்பட்டவை. கடந்த கால செயல்திறன் எதிர்கால முடிவுகளை உறுதிப்படுத்தாது."
    - "பயிற்சியாளர் இந்தத் தளம் மூலம் SEBI பதிவுசெய்யப்பட்ட முதலீட்டு ஆலோசகர் அல்லது ஆராய்ச்சி ஆய்வாளராக செயல்படவில்லை."

