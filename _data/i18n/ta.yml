about:
  title: "எங்களைப் பற்றி"
  paragraphs:
    - "Share Business Concepts — மக்கள் பங்குச் சந்தையை தெளிவுடனும் ஒழுக்கத்துடனும் புரிந்துகொள்ள உதவவேண்டி ஒரு எளிய நோக்கத்துடன் நிறுவப்பட்டது."
    - "பலர் உற்சாகத்துடன் சந்தையில் நுழைகிறார்கள், ஆனால் ஆன்லைனில் கிடைக்கும் எண்ணற்ற உத்திகள், குறிகாட்டிகள் மற்றும் கருத்துக்களால் விரைவில் திக்குமுக்காடுகிறார்கள். கட்டமைக்கப்பட்ட அணுகுமுறை இல்லாமல், வர்த்தகம் பெரும்பாலும் குழப்பமாகவும் சீரற்றதாகவும் ஆகிவிடுகிறது."
    - "Share Business Concepts இல், குறிப்புகள் அல்லது குறுக்கு வழிகளில் கவனம் செலுத்தப்படுவதில்லை. மாறாக, கற்பவர்கள் விலை நடவடிக்கை, சந்தை அமைப்பு மற்றும் இடர் மேலாண்மை ஆகியவற்றைப் புரிந்துகொள்வதில் வலுவான அடித்தளத்தை உருவாக்க உதவுவதே எங்கள் குறிக்கோள்."
    - "எங்கள் தத்துவம் எளிமையானது: வர்த்தகர்கள் விளக்கப்படங்கள் எவ்வாறு செயல்படுகின்றன என்பதை உண்மையாகப் புரிந்துகொண்டால், அவர்கள் வெளியாட்கள் தரும் கணிப்புகளை நம்புவதை நிறுத்திவிட்டு, தகவலறிந்த முடிவுகளை எடுக்கத் தொடங்குவார்கள்."
    - "அதனால்தான் எங்கள் வழிகாட்டும் கருத்து: <strong>\"Make Charts Your Mother Tongue - விளக்கப்படங்களை உங்கள் தாய்மொழியாக்குங்கள்.\"</strong>"
    - "கட்டமைக்கப்பட்ட கற்றல் மற்றும் நடைமுறை நுண்ணறிவு மூலம், வர்த்தகர்கள் விளக்கப்படங்களை இயல்பாகப் படிக்கும் திறனை வளர்த்துக்கொண்டுச் சந்தைகளை நம்பிக்கை மற்றும் ஒழுக்கத்துடன் அணுக உதவுவதே எங்கள் நோக்கம்."

